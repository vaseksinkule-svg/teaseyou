<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a5f3c"/>
      <stop offset="1" stop-color="#2c4a2e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Three tea "glasses" motif on the right -->
  <g transform="translate(760,150)">
    <g transform="translate(0,40)">
      <rect x="0" y="0" width="90" height="260" rx="14" fill="#f5f1e9" opacity="0.12"/>
      <rect x="6" y="150" width="78" height="104" rx="10" fill="#ffe066"/>
      <rect x="6" y="96"  width="78" height="58"  fill="#4caf50"/>
      <rect x="6" y="40"  width="78" height="60"  rx="10" fill="#8da676"/>
    </g>
    <g transform="translate(120,20)">
      <rect x="0" y="0" width="90" height="290" rx="14" fill="#f5f1e9" opacity="0.12"/>
      <rect x="6" y="172" width="78" height="112" rx="10" fill="#ffc107"/>
      <rect x="6" y="112" width="78" height="64"  fill="#cc4747"/>
      <rect x="6" y="44"  width="78" height="72"  rx="10" fill="#f5e6d3"/>
    </g>
    <g transform="translate(240,55)">
      <rect x="0" y="0" width="90" height="250" rx="14" fill="#f5f1e9" opacity="0.12"/>
      <rect x="6" y="146" width="78" height="98"  rx="10" fill="#4a3b32"/>
      <rect x="6" y="92"  width="78" height="58"  fill="#ff9800"/>
      <rect x="6" y="40"  width="78" height="56"  rx="10" fill="#f3e5ab"/>
    </g>
  </g>

  <!-- Text -->
  <text x="90" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="#f5f1e9">Tease</text>
  <text x="90" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="120" font-weight="700" fill="#f5f1e9">you</text>
  <text x="96" y="440" font-family="'Helvetica Neue', Arial, sans-serif" font-size="34" fill="#cdd8c4" letter-spacing="1">Your taste, your tea. Mix it, name it.</text>
  <text x="96" y="505" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffe066">500+ kombinací · doprava zdarma nad 500 Kč</text>
</svg>
